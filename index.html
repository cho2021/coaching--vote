<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年度 コーチング大会 最終審査システム | Q-MAX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --silver: #c0c0c0; --pres: #e91e63; --dark: #020a18; --white: #e6f1ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: 'Noto Sans JP', sans-serif; color: var(--white); overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .container { display: none; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; padding-bottom: 50px; animation: fadeIn 0.5s ease; overflow-y: auto; }
        .container.active { display: flex; }
        .section-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; padding: 30px; margin-bottom: 20px; width: 90%; max-width: 800px; backdrop-filter: blur(10px); }
        .title-h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .btn-choice { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: center; }
        .btn-choice:hover:not(.voted) { background: rgba(212, 175, 55, 0.2); border-color: var(--gold); }
        .btn-choice.selected { background: var(--gold); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--gold); }
        .btn-choice.voted { background: #333 !important; color: #777 !important; border-color: #444 !important; cursor: not-allowed; }
        .btn-choice.voted::after { content: " (投票済)"; font-size: 0.7rem; display: block; }
        .submit-btn { display: block; width: 100%; max-width: 400px; margin: 20px auto; padding: 20px; font-size: 1.4rem; font-weight: bold; background: var(--gold); border: none; border-radius: 50px; cursor: pointer; transition: 0.4s; }
        .submit-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        /* 集計テーブルのスタイル */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        th { color: var(--gold); font-size: 0.9rem; }
        .count-num { font-weight: 900; color: #fff; font-size: 1.2rem; }

        /* 発表画面の演出 */
        .result-card {
            text-align: center; padding: 40px; border: 2px solid var(--gold); background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 20px; margin-top: 30px; width: 90%; max-width: 600px; cursor: pointer; transition: 0.5s;
        }
        .winner-name { font-size: 4rem; font-weight: 900; color: #fff; opacity: 0; transform: scale(0.5); transition: 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        .result-card.revealed .winner-name { opacity: 1; transform: scale(1); text-shadow: 0 0 30px var(--gold); }
        .tap-hint { font-size: 0.8rem; color: #555; margin-top: 10px; letter-spacing: 0.2em; }
        .result-card.revealed .tap-hint { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.05; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <audio id="bgm-loop" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-fanfare"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>
    <canvas id="particleCanvas"></canvas>

    <!-- 1. 審査員選択 -->
    <div id="page-judge" class="container active">
        <header style="margin-top:50px; text-align: center;">
            <div style="font-size: 1rem; color: var(--gold); letter-spacing: 0.3em; margin-bottom: 10px;">株式会社キューマックス</div>
            <h1>審査員選択</h1>
        </header>
        <div class="section-box">
            <div class="grid" id="judge-grid"></div>
        </div>
        <div id="admin-tools" style="display:none; margin-top: 50px;">
            <button class="submit-btn" onclick="startAdminFlow()" style="background:#fff; color:#000;">結果を確定する（管理者）</button>
            <button onclick="resetDatabase()" style="background:none; border:none; color:red; cursor:pointer; width:100%;">全リセット</button>
        </div>
    </div>

    <!-- 2. 投票画面 -->
    <div id="page-voting" class="container">
        <header style="margin-top:50px; text-align: center;"><h1 id="vote-header-name">投票</h1></header>
        <div id="board-votes" style="width:100%;">
            <div class="section-box" style="margin:0 auto 20px;"><div class="title-h2">最優秀賞 選出</div><div class="grid candidate-grid" data-award="最優秀賞"></div></div>
            <div class="section-box" style="margin:0 auto 20px;"><div class="title-h2">優秀賞 選出</div><div class="grid candidate-grid" data-award="優秀賞"></div></div>
        </div>
        <div id="pres-votes" style="width:100%; display:none;">
            <div class="section-box" style="margin:0 auto 20px;"><div class="title-h2">社長賞 選出</div><div class="grid candidate-grid" data-award="社長賞"></div></div>
        </div>
        <button class="submit-btn" id="final-submit-btn" disabled onclick="sendToDatabase()">投票を確定する</button>
    </div>

    <!-- 3. 管理者：集計レポート確認 -->
    <div id="page-admin-report" class="container">
        <header style="margin-top:50px; text-align: center;"><h1>得票数レポート</h1></header>
        <div class="section-box">
            <div class="title-h2">投票結果一覧</div>
            <table id="tally-table">
                <thead>
                    <tr><th>氏名</th><th>最優秀</th><th>優秀</th><th>社長賞</th></tr>
                </thead>
                <tbody id="tally-body"></tbody>
            </table>
            <button class="submit-btn" onclick="proceedToFinalize('優秀賞')">次へ（当選者の確定）</button>
        </div>
    </div>

    <!-- 4. 管理者：当選者確定 -->
    <div id="page-finalize-winner" class="container">
        <div class="section-box">
            <div class="title-h2" id="finalize-title">賞の確定</div>
            <p id="finalize-instruction" style="margin-bottom:20px; color:#aaa;"></p>
            <div class="grid" id="finalize-choice-area"></div>
            <button class="submit-btn" id="finalize-confirm-btn" disabled onclick="confirmWinner()">この人を確定する</button>
        </div>
    </div>

    <!-- 5. 結果発表 (タップ演出) -->
    <div id="page-results" class="container">
        <header style="margin-top:50px; text-align: center;"><h1>2025年度 最終結果発表</h1></header>
        <div id="results-display" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button class="submit-btn" onclick="location.reload()" style="margin-top:50px; background:none; border:1px solid #444; color:#666;">トップへ戻る</button>
    </div>

    <div class="admin-trigger" onclick="adminTally()">● 集計</div>

<script>
    const SB_URL = "https://rmkogyrgnuopfhuqrbez.supabase.co";
    const SB_KEY = "sb_publishable_xQMZgm0Q5WTUJKzp88WBIw_E6nbT11z";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const judges = ["吉武 直志", "髙瀬 悠二", "石井 祥太", "張 宝俊", "西寺 舞", "中山 好成", "山口 伶奈"];
    const candidates = ["牟田 理菜", "ユベール ミカエル", "中村 美穂", "黄 卓賢", "石田 萌々華", "三浦 健二", "松井 未来"];
    let myName = "";
    let myVotes = {};
    let rawData = [];
    let winnersToSave = { "最優秀賞": null, "優秀賞": null, "社長賞": null };
    let currentStepAward = "";

    async function initApp() {
        const { data } = await supabaseClient.from('votes').select('*');
        const votedJudges = data ? [...new Set(data.map(d => d.judge_name).filter(n => !n.startsWith('SYSTEM_')))] : [];
        if(votedJudges.length >= 7) document.getElementById('admin-tools').style.display = 'block';

        const jGrid = document.getElementById('judge-grid');
        jGrid.innerHTML = "";
        judges.forEach(j => {
            const d = document.createElement('div');
            const isVoted = votedJudges.includes(j);
            d.className = isVoted ? 'btn-choice voted' : 'btn-choice';
            d.innerText = j;
            if(!isVoted) d.onclick = () => startVote(j);
            jGrid.appendChild(d);
        });

        document.querySelectorAll('.candidate-grid').forEach(grid => {
            const award = grid.dataset.award;
            candidates.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'btn-choice'; btn.innerText = c;
                btn.onclick = () => {
                    if(myName !== "吉武 直志") {
                        const other = award === "最優秀賞" ? "優秀賞" : "最優秀賞";
                        if(myVotes[other] === c) { alert("同じ人は選べません。"); return; }
                    }
                    grid.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    myVotes[award] = c;
                    updateSubmitBtn();
                };
                grid.appendChild(btn);
            });
        });
        initParticles();
    }

    function startVote(name) {
        myName = name;
        showPage('page-voting');
        document.getElementById('vote-header-name').innerText = name + " 様";
        const isPres = (name === "吉武 直志");
        document.getElementById('pres-votes').style.display = isPres ? 'block' : 'none';
        document.getElementById('board-votes').style.display = isPres ? 'none' : 'block';
    }

    function updateSubmitBtn() {
        const btn = document.getElementById('final-submit-btn');
        if(myName === "吉武 直志") btn.disabled = !myVotes["社長賞"];
        else btn.disabled = !(myVotes["最優秀賞"] && myVotes["優秀賞"]);
    }

    async function sendToDatabase() {
        const insertData = Object.entries(myVotes).map(([type, cand]) => ({
            judge_name: myName, award_type: type, candidate_name: cand
        }));
        await supabaseClient.from('votes').insert(insertData);
        location.reload();
    }

    async function startAdminFlow() {
        const { data } = await supabaseClient.from('votes').select('*');
        rawData = data.filter(v => !v.judge_name.startsWith('SYSTEM_'));
        
        const tallyBody = document.getElementById('tally-body');
        tallyBody.innerHTML = "";
        
        candidates.forEach(c => {
            const grand = rawData.filter(v => v.award_type === "最優秀賞" && v.candidate_name === c).length;
            const excl = rawData.filter(v => v.award_type === "優秀賞" && v.candidate_name === c).length;
            const pres = rawData.filter(v => v.award_type === "社長賞" && v.candidate_name === c).length;
            
            tallyBody.innerHTML += `
                <tr>
                    <td>${c}</td>
                    <td class="count-num">${grand}</td>
                    <td class="count-num">${excl}</td>
                    <td class="count-num">${pres}</td>
                </tr>
            `;
        });
        showPage('page-admin-report');
    }

    function proceedToFinalize(awardType) {
        currentStepAward = awardType;
        showPage('page-finalize-winner');
        document.getElementById('finalize-title').innerText = `${awardType}の確定`;
        const area = document.getElementById('finalize-choice-area');
        area.innerHTML = "";
        document.getElementById('finalize-confirm-btn').disabled = true;

        let options = [];
        if(awardType === "社長賞") {
            options = candidates;
            document.getElementById('finalize-instruction').innerText = "社長賞を選んでください（全員が表示されています）";
        } else {
            const tally = {};
            rawData.filter(v => v.award_type === awardType).forEach(v => {
                tally[v.candidate_name] = (tally[v.candidate_name] || 0) + 1;
            });
            const max = Math.max(...Object.values(tally), 0);
            options = Object.keys(tally).filter(k => tally[k] === max);
            document.getElementById('finalize-instruction').innerText = `得票トップの候補者です。${awardType}を確定してください。`;
        }

        options.forEach(w => {
            const btn = document.createElement('div');
            btn.className = 'btn-choice'; btn.innerText = w;
            btn.onclick = () => {
                area.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                winnersToSave[awardType] = w;
                document.getElementById('finalize-confirm-btn').disabled = false;
            };
            area.appendChild(btn);
        });
    }

    async function confirmWinner() {
        if(currentStepAward === "優秀賞") proceedToFinalize("最優秀賞");
        else if(currentStepAward === "最優秀賞") proceedToFinalize("社長賞");
        else {
            const finalData = Object.entries(winnersToSave).map(([type, name]) => ({
                judge_name: `SYSTEM_FINAL_${type}`, award_type: type, candidate_name: name
            }));
            await supabaseClient.from('votes').insert(finalData);
            alert("全結果を保存しました。");
            location.reload();
        }
    }

    async function adminTally() {
        const { data } = await supabaseClient.from('votes').select('*');
        const saved = data.filter(v => v.judge_name.startsWith('SYSTEM_FINAL_'));
        if(saved.length < 3) return alert("まだ管理者の確定作業が終わっていません。");

        document.getElementById('bgm-loop').pause();
        document.getElementById('bgm-fanfare').play();
        showPage('page-results');
        
        const getWinner = (type) => saved.find(s => s.judge_name === `SYSTEM_FINAL_${type}`).candidate_name;

        document.getElementById('results-display').innerHTML = [
            { label: "優秀賞", color: "var(--silver)", name: getWinner("優秀賞") },
            { label: "最優秀賞", color: "var(--gold)", name: getWinner("最優秀賞") },
            { label: "社長賞", color: "var(--pres)", name: getWinner("社長賞") }
        ].map(res => `
            <div class="result-card" style="border-color:${res.color}" onclick="this.classList.add('revealed')">
                <div class="winner-label" style="color:${res.color}">${res.label}</div>
                <div class="winner-name">${res.name}</div>
                <div class="tap-hint">TAP TO REVEAL</div>
            </div>
        `).join('');
    }

    async function resetDatabase() { if(confirm("リセットしますか？")) { await supabaseClient.from('votes').delete().neq('id', 0); location.reload(); } }
    function showPage(id) { document.querySelectorAll('.container').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class P {
        constructor() { this.init(); }
        init() { this.x = Math.random() * canvas.width; this.y = canvas.height + 10; this.size = Math.random() * 2 + 1; this.speedY = Math.random() * -1.2 - 0.3; this.opacity = Math.random() * 0.5 + 0.2; }
        update() { this.y += this.speedY; if (this.y < -10) this.init(); }
        draw() { ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    function initParticles() { for(let i=0; i<100; i++) particles.push(new P()); animate(); }
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }

    initApp();
</script>
</body>
</html>
